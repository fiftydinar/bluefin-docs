name: Update SBOM Attestation Cache

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  update-sbom-cache:
    name: Fetch and cache SBOM attestations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore existing SBOM data cache (for incremental updates)
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: static/data
          key: github-data-sbom-${{ github.run_id }}
          restore-keys: |
            github-data-sbom-
            github-data-

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Install oras
        uses: oras-project/setup-oras@5c0b487ce3fe0ce3ab0d034e63669e426e294e4d # v1.2.3

      - name: Login to GHCR (for oras referrers API)
        run: |
          echo "${{ secrets.PROJECT_READ_TOKEN || github.token }}" \
            | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Fetch SBOM attestation metadata
        env:
          # PROJECT_READ_TOKEN must have packages:read scope for cross-org
          # (ublue-os) package registry access. GITHUB_TOKEN alone is
          # insufficient for cross-org package reads.
          GITHUB_TOKEN: ${{ secrets.PROJECT_READ_TOKEN }}
        run: npm run fetch-sbom

      - name: Save SBOM data cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: static/data
          key: github-data-sbom-${{ github.run_id }}
